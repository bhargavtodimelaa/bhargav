<style>*{margin:0;padding:0;box-sizing:border-box}:root{--blue:#1a73e8;--dark:#1557b0;--g100:#f1f3f4;--g200:#e8eaed;--g300:#dadce0;--g600:#5f6368;--bg:#fff;--bg2:#f8f9fa;--text:#202124;--shadow:0 1px 3px rgba(0,0,0,.12),0 1px 2px rgba(0,0,0,.08);--radius:12px}html,body{background:var(--bg2);font-family:Inter,sans-serif;color:var(--text);width:100%;min-height:100vh;overflow-x:hidden}::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:0 0}::-webkit-scrollbar-thumb{background:var(--g300);border-radius:8px}.header{background:var(--bg);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--g200);position:sticky;top:0;z-index:10;box-shadow:var(--shadow)}.header-brand{display:flex;align-items:center;gap:12px}.header-brand .material-symbols-outlined{font-size:28px;color:var(--blue)}.header h1{font-size:1.3rem;font-weight:600}.header .counter{background:var(--g100);padding:4px 16px;border-radius:40px;font-size:.75rem;font-weight:500;color:var(--g600);border:1px solid var(--g200);white-space:nowrap}.filter-bar{background:var(--bg);padding:8px 24px;display:flex;flex-wrap:wrap;align-items:center;gap:8px 16px;border-bottom:1px solid var(--g200);position:sticky;top:64px;z-index:9}.filter-bar .search{flex:1 1 200px;display:flex;align-items:center;background:var(--g100);border-radius:24px;padding:4px 12px 4px 16px;border:1px solid transparent}.filter-bar .search:focus-within{background:var(--bg);border-color:var(--blue);box-shadow:0 0 0 2px rgba(26,115,232,.2)}.filter-bar .search .material-symbols-outlined{font-size:20px;color:var(--g600);margin-right:8px}.filter-bar input{flex:1;background:0 0;border:none;padding:8px 4px;font-size:.9rem;font-family:inherit;color:var(--text);outline:0;min-width:80px}.filter-bar input::placeholder{color:var(--g600)}.filter-bar .cats{display:flex;flex-wrap:wrap;gap:4px}.filter-bar .cat{background:0 0;border:1px solid var(--g200);color:var(--g600);padding:4px 16px;border-radius:40px;font-size:.75rem;font-weight:500;cursor:pointer;white-space:nowrap;text-transform:capitalize;font-family:inherit}.filter-bar .cat:hover{background:var(--g100)}.filter-bar .cat.active{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 1px 3px rgba(26,115,232,.3)}.last-section{padding:16px 24px 4px;max-width:1440px;margin:0 auto;width:100%;display:none}.last-section.visible{display:block}.last-section .title{font-size:.8rem;font-weight:500;color:var(--g600);text-transform:uppercase;letter-spacing:.3px;margin-bottom:10px}.last-grid{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px}.last-grid::-webkit-scrollbar{height:4px}.last-grid::-webkit-scrollbar-thumb{background:var(--g300);border-radius:8px}.last-card{flex:0 0 110px;background:var(--bg);border-radius:var(--radius);padding:12px 8px;border:1px solid var(--g200);cursor:pointer;display:flex;flex-direction:column;align-items:center;text-align:center;min-width:90px;box-shadow:var(--shadow)}.last-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.1);border-color:var(--blue)}.last-card .lp-logo{width:48px;height:48px;border-radius:50%;background:var(--g100);display:flex;align-items:center;justify-content:center;overflow:hidden;border:1px solid var(--g200);margin-bottom:6px}.last-card .lp-logo img{max-width:100%;max-height:100%;object-fit:contain;padding:4px}.last-card .lp-name{font-size:.7rem;font-weight:500;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.2;max-height:2.4em}.last-card .lp-badge{font-size:.5rem;color:var(--blue);background:rgba(26,115,232,.08);padding:1px 10px;border-radius:40px;margin-top:4px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}.grid{padding:16px 24px 30px;display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:16px;max-width:1440px;margin:0 auto;width:100%}.ch-card{background:var(--bg);border-radius:var(--radius);overflow:hidden;border:1px solid var(--g200);cursor:pointer;display:flex;flex-direction:column;align-items:center;text-align:center;padding:16px 8px 14px;box-shadow:var(--shadow)}.ch-card:hover{box-shadow:0 6px 20px rgba(0,0,0,.08);border-color:var(--blue)}.ch-card .logo{width:72px;height:72px;background:var(--g100);border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:8px;overflow:hidden;border:1px solid var(--g200);flex-shrink:0}.ch-card img{max-width:100%;max-height:100%;object-fit:contain;padding:6px}.ch-card .name{font-size:.85rem;font-weight:500;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;word-break:break-word;max-height:2.4em}.ch-card .cat{font-size:.6rem;color:var(--g600);margin-top:4px;background:var(--g100);padding:2px 12px;border-radius:40px;display:inline-block;font-weight:500;text-transform:uppercase;letter-spacing:.3px;border:1px solid var(--g200)}.empty{grid-column:1/-1;text-align:center;padding:48px 20px;color:var(--g600);background:var(--bg);border-radius:var(--radius);border:1px dashed var(--g300)}.empty .material-symbols-outlined{font-size:3rem;color:var(--g300);display:block;margin-bottom:8px}.player{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:1000;flex-direction:column}.player.active{display:flex}#pc{width:100%;height:100%;background:#000;display:flex;align-items:center;justify-content:center}#video{width:100%;height:100%;max-height:100vh;background:#000}.top-bar{position:absolute;top:0;left:0;right:0;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(180deg,rgba(0,0,0,.6)0,transparent 100%);z-index:1001;pointer-events:none}.top-bar>*{pointer-events:auto}.pbtn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.06);color:#fff;padding:8px 16px;border-radius:40px;display:flex;align-items:center;gap:6px;font-size:.85rem;font-weight:500;cursor:pointer;font-family:inherit;box-shadow:0 2px 8px rgba(0,0,0,.2)}.pbtn .material-symbols-outlined{font-size:20px}.pbtn:hover{background:rgba(255,255,255,.15)}.pclose{width:40px;height:40px;border-radius:50%;padding:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.08);color:#fff;cursor:pointer}.pclose:hover{background:rgba(255,59,59,.3);border-color:#ff3b3b}.pclose .material-symbols-outlined{font-size:24px}.pinfo{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.6);padding:6px 20px 6px 14px;border-radius:50px;border:1px solid rgba(255,255,255,.06);color:#fff;font-size:.85rem;font-weight:500;display:flex;align-items:center;gap:10px;box-shadow:0 4px 20px rgba(0,0,0,.4);pointer-events:none;white-space:nowrap}.pinfo img{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.05);padding:3px;border:1px solid rgba(255,255,255,.05)}.pinfo .pname{max-width:180px;overflow:hidden;text-overflow:ellipsis}.err{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:2000;justify-content:center;align-items:center}.err.active{display:flex}.err-modal{background:var(--bg);border-radius:24px;padding:32px 28px 28px;max-width:400px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2)}.err-modal .material-symbols-outlined{font-size:3rem;color:#ea4335;margin-bottom:12px}.err-modal h2{font-size:1.2rem;font-weight:600;margin-bottom:8px}.err-modal p{color:var(--g600);font-size:.9rem;line-height:1.5;margin-bottom:20px}.err-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}.ebtn{padding:10px 28px;border-radius:40px;border:none;font-size:.85rem;font-weight:500;cursor:pointer;font-family:inherit}.ebtn.primary{background:var(--blue);color:#fff;box-shadow:0 1px 3px rgba(26,115,232,.2)}.ebtn.primary:hover{background:var(--dark)}.ebtn.secondary{background:var(--g100);color:var(--text);border:1px solid var(--g200)}.ebtn.secondary:hover{background:var(--g200)}@media(max-width:768px){.header{padding:10px 16px}.header h1{font-size:1.1rem}.filter-bar{padding:6px 16px;top:56px}.filter-bar .search{padding:2px 10px 2px 14px}.grid{padding:12px 16px 20px;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px}.ch-card .logo{width:60px;height:60px}.pinfo{bottom:60px;font-size:.75rem;padding:4px 14px 4px 10px}.pinfo img{width:22px;height:22px}.pbtn{padding:6px 12px;font-size:.75rem}.last-card{flex:0 0 90px;min-width:70px;padding:8px 6px}.last-card .lp-logo{width:40px;height:40px}}@media(max-width:480px){.grid{grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;padding:8px 12px 16px}.ch-card .logo{width:50px;height:50px}.ch-card .name{font-size:.7rem}.filter-bar .cat{font-size:.65rem;padding:2px 10px}.pinfo{bottom:40px;font-size:.65rem;padding:3px 10px 3px 8px}.pinfo img{width:18px;height:18px}.pbtn{padding:4px 10px;font-size:.65rem}.pbtn .material-symbols-outlined{font-size:16px}.pclose{width:32px;height:32px}.pclose .material-symbols-outlined{font-size:18px}}
</style>

<body>
<header class="header"><div class="header-brand"><span class="material-symbols-outlined">live_tv</span><h1>Live TV</h1></div><span class="counter" id="counter">0 channels</span></header>
<div class="filter-bar"><div class="search"><span class="material-symbols-outlined">search</span><input type="text" id="search" placeholder="Search channels..."></div><div class="cats" id="cats"></div></div>
<div class="last-section" id="lastSection"><div class="title">🕐 Recently played</div><div class="last-grid" id="lastGrid"></div></div>
<div class="grid" id="grid"></div>
<div class="player" id="player"><div class="top-bar"><button class="pbtn" id="back"><span class="material-symbols-outlined">arrow_back</span> Back</button><button class="pclose" id="close"><span class="material-symbols-outlined">close</span></button></div><div id="pc"><video id="video" controls playsinline autoplay></video></div><div class="pinfo" id="pinfo"><img id="plogo" src="" alt="logo"><span class="pname" id="pname">Channel</span></div></div>
<div class="err" id="err"><div class="err-modal"><span class="material-symbols-outlined">error</span><h2>Something went wrong</h2><p>This channel is currently unavailable. Please try again.</p><div class="err-actions"><button class="ebtn primary" id="retry">Retry</button><button class="ebtn secondary" id="errclose">OK</button></div></div></div>
<script>
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', e => {
  if (e.key === 'F12' || e.keyCode === 123) { e.preventDefault(); return false; }
  if (e.ctrlKey && e.shiftKey && ['I', 'J', 'C', 'P'].includes(e.key)) { e.preventDefault(); return false; }
  if (e.ctrlKey && ['u', 'U', 's', 'S'].includes(e.key)) { e.preventDefault(); return false; }
});

let allChannels = [];
let filteredChannels = [];
let currentCategory = 'All';
let searchTerm = '';
let cachedCookie = null;
let cookieTimestamp = 0;
const COOKIE_MAX_AGE = 5 * 60 * 1000;
let activeCookie = null;
let expandElement = null;
let isClosing = false;
let shakaPlayer = null;
let currentChannel = null;
let currentCardRect = null;
let errorChannel = null;
let isErrorShowing = false;
let lastPlayedChannels = [];
let isPlaying = false;
let playTimeout = null;
const STORAGE_KEY = 'liveTV_lastPlayed';

const grid = document.getElementById('grid');
const searchInput = document.getElementById('search');
const categoryGroup = document.getElementById('cats');
const channelCounter = document.getElementById('counter');
const playerOverlay = document.getElementById('player');
const closePlayerBtn = document.getElementById('close');
const backBtn = document.getElementById('back');
const videoEl = document.getElementById('video');
const playerContainer = document.getElementById('pc');
const playerName = document.getElementById('pname');
const playerLogo = document.getElementById('plogo');
const errorOverlay = document.getElementById('err');
const errorRetry = document.getElementById('retry');
const errorClose = document.getElementById('errclose');

function loadLastPlayed() {
  try {
    const data = localStorage.getItem(STORAGE_KEY);
    if (data) {
      lastPlayedChannels = JSON.parse(data).filter(ch => ch && ch.id && ch.name);
      return lastPlayedChannels;
    }
  } catch (_) {}
  return [];
}

function saveLastPlayed(channel) {
  if (!channel || !channel.id) return;
  lastPlayedChannels = lastPlayedChannels.filter(ch => ch.id !== channel.id);
  lastPlayedChannels.unshift(channel);
  lastPlayedChannels = lastPlayedChannels.slice(0, 10);
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(lastPlayedChannels)); } catch (_) {}
  renderLastPlayed();
}

function renderLastPlayed() {
  const section = document.getElementById('lastSection');
  const gridEl = document.getElementById('lastGrid');
  if (!lastPlayedChannels.length) { section.classList.remove('visible'); return; }
  section.classList.add('visible');
  gridEl.innerHTML = lastPlayedChannels.map(ch => `
    <div class="last-card" data-channel='${JSON.stringify(ch).replace(/'/g,"&#39;")}'>
      <div class="lp-logo">
        <img src="${ch.logo || 'https://ui-avatars.com/api/?name='+encodeURIComponent(ch.name)+'&background=e8eaed&color=202124&size=50'}" 
             alt="${ch.name}" loading="lazy"
             onerror="this.onerror=null;this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(ch.name)}&background=e8eaed&color=202124&size=50';" />
      </div>
      <div class="lp-name">${ch.name}</div>
      <div class="lp-badge">▶ Play</div>
    </div>
  `).join('');

  gridEl.querySelectorAll('.last-card').forEach(card => {
    card.addEventListener('click', (e) => {
      if (isClosing || isPlaying) return;
      const raw = card.dataset.channel;
      try {
        const ch = JSON.parse(raw);
        setTimeout(() => playChannel(ch), 100);
      } catch (_) {}
    });
  });
}

function showError(channel) {
  if (isErrorShowing) return;
  isErrorShowing = true;
  errorChannel = channel;
  errorOverlay.classList.add('active');
}

function hideError() {
  isErrorShowing = false;
  errorOverlay.classList.remove('active');
  errorChannel = null;
}

errorRetry.addEventListener('click', () => {
  hideError();
  if (errorChannel) { cachedCookie = null; cookieTimestamp = 0; setTimeout(() => playChannel(errorChannel), 300); }
});
errorClose.addEventListener('click', () => { hideError(); if (playerOverlay.classList.contains('active')) closePlayer(); });
errorOverlay.addEventListener('click', (e) => { if (e.target === errorOverlay) { hideError(); if (playerOverlay.classList.contains('active')) closePlayer(); } });

async function fetchCookie() {
  const now = Date.now();
  if (cachedCookie && (now - cookieTimestamp) < COOKIE_MAX_AGE) return cachedCookie;
  try {
    const res = await fetch('https://fragrant-butterfly-575f.bhargavtodimela4.workers.dev/cookies', {
      cache: 'no-cache',
      headers: { 'Cache-Control': 'no-cache, no-store, must-revalidate', 'Pragma': 'no-cache' }
    });
    const data = await res.json();
    const cookieObj = data.find(item => item.cookie);
    if (cookieObj && cookieObj.cookie) { cachedCookie = cookieObj.cookie; cookieTimestamp = now; return cachedCookie; }
    return null;
  } catch (_) { return null; }
}

async function fetchChannels() {
  try {
    const res = await fetch('https://fragrant-butterfly-575f.bhargavtodimela4.workers.dev/channels', {
      headers: { 'X-Requested-With': 'XMLHttpRequest' },
      cache: 'no-cache'
    });
    const data = await res.json();
    allChannels = Array.isArray(data) ? data : (data.channels || []);
    allChannels = allChannels.filter(c => c && typeof c === 'object' && c.name);
    extractCategories();
    applyFilters();
    updateCounter();
    loadLastPlayed();
    renderLastPlayed();
    return allChannels;
  } catch (_) {
    grid.innerHTML = `<div class="empty"><span class="material-symbols-outlined">wifi_off</span>Could not load channels. Please refresh.</div>`;
    return [];
  }
}

function extractCategories() {
  const cats = new Set(['All']);
  allChannels.forEach(c => { if (c.category && c.category.trim()) cats.add(c.category.trim()); });
  const sorted = ['All', ...Array.from(cats).filter(c => c !== 'All').sort()];
  categoryGroup.innerHTML = sorted.map(cat =>
    `<button class="cat ${cat === 'All' ? 'active' : ''}" data-cat="${cat}">${cat}</button>`
  ).join('');
  document.querySelectorAll('.cat').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.cat').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentCategory = btn.dataset.cat;
      applyFilters();
    });
  });
}

function applyFilters() {
  const term = searchTerm.toLowerCase().trim();
  filteredChannels = allChannels.filter(ch => {
    const matchName = ch.name.toLowerCase().includes(term);
    const matchCat = currentCategory === 'All' || ch.category === currentCategory;
    return matchName && matchCat;
  });
  renderGrid();
  updateCounter();
}

function renderGrid() {
  if (!filteredChannels.length) {
    grid.innerHTML = `<div class="empty"><span class="material-symbols-outlined">search_off</span>No channels found</div>`;
    return;
  }
  let html = '';
  filteredChannels.forEach((ch, idx) => {
    const logo = ch.logo || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(ch.name) + '&background=e8eaed&color=202124&size=80';
    html += `
      <div class="ch-card" data-channel='${JSON.stringify(ch).replace(/'/g,"&#39;")}'>
        <div class="logo">
          <img src="${logo}" alt="${ch.name}" loading="lazy"
               onerror="this.onerror=null;this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(ch.name)}&background=e8eaed&color=202124&size=80';" />
        </div>
        <div class="name">${ch.name}</div>
        <span class="cat">${ch.category || 'General'}</span>
      </div>
    `;
  });
  grid.innerHTML = html;
  document.querySelectorAll('.ch-card').forEach(card => {
    card.addEventListener('click', (e) => {
      if (isClosing || isPlaying) return;
      const raw = card.dataset.channel;
      try {
        const ch = JSON.parse(raw);
        if (playTimeout) clearTimeout(playTimeout);
        playTimeout = setTimeout(() => playChannel(ch), 100);
      } catch (_) {}
    });
  });
}

function updateCounter() {
  channelCounter.textContent = `${filteredChannels.length} / ${allChannels.length} channels`;
}

searchInput.addEventListener('input', (e) => { searchTerm = e.target.value; applyFilters(); });

async function playChannel(channel) {
  if (!channel || isClosing) return;
  if (isPlaying) { console.warn('Already playing'); return; }
  isPlaying = true;
  currentChannel = channel;
  playerName.textContent = channel.name || 'Channel';
  playerLogo.src = channel.logo || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(channel.name) + '&background=e8eaed&color=202124&size=40';
  saveLastPlayed(channel);
  destroyPlayer();
  playerOverlay.classList.add('active');
  
  // Auto fullscreen
  try {
    if (document.documentElement.requestFullscreen) {
      await document.documentElement.requestFullscreen();
    } else if (document.documentElement.webkitRequestFullscreen) {
      await document.documentElement.webkitRequestFullscreen();
    } else if (document.documentElement.msRequestFullscreen) {
      await document.documentElement.msRequestFullscreen();
    }
  } catch (_) {}

  try {
    shaka.polyfill.installAll();
    if (!shaka.Player.isBrowserSupported()) { showError(channel); isPlaying = false; return; }
    shakaPlayer = new shaka.Player(videoEl);
    try { new shaka.ui.Overlay(shakaPlayer, playerContainer, videoEl); } catch (_) {}
    shakaPlayer.configure({
      preferredAudioLanguage: 'te',
      preferredTextLanguage: 'en',
      drm: {},
      streaming: { lowLatencyMode: true, rebufferingGoal: 2, bufferBehind: 30 }
    });
    const keyId = channel.keyId && channel.keyId !== 'null' ? channel.keyId : null;
    const key = channel.key && channel.key !== 'null' ? channel.key : null;
    if (keyId && key) {
      shakaPlayer.configure({ drm: { clearKeys: { [keyId]: key } }, streaming: { lowLatencyMode: true } });
    } else {
      shakaPlayer.configure({ drm: { clearKeys: {} }, streaming: { lowLatencyMode: true } });
    }
    const cookie = await fetchCookie();
    activeCookie = cookie || '';
    if (shakaPlayer.getNetworkingEngine) {
      const engine = shakaPlayer.getNetworkingEngine();
      engine.registerRequestFilter((type, request) => {
        request.headers["Referer"] = "https://www.jiotv.com/";
        request.headers["User-Agent"] = "plaYtv/7.1.5";
        if (activeCookie && (type === 0 || type === 1)) {
          request.uris[0] = request.uris[0].split("?")[0] + "?" + activeCookie;
        }
      });
    }
    const streamUrls = [channel.url, channel.url1, channel.url2, channel.url3]
      .filter(Boolean)
      .map(u => u.replace(/bpk-tv\/\//g, 'bpk-tv/'));
    let loaded = false;
    for (let i = 0; i < streamUrls.length; i++) {
      try {
        await shakaPlayer.load(streamUrls[i]);
        setTimeout(() => {
          try {
            const tracks = shakaPlayer.getAudioTracks();
            if (tracks && tracks.length) {
              let tel = tracks.find(t => t.language === 'te') || tracks.find(t => ['hi', 'ta', 'ml', 'kn', 'mr', 'bn'].includes(t.language));
              if (tel) shakaPlayer.selectAudioTrack(tel);
            }
          } catch (_) {}
        }, 500);
        await videoEl.play();
        loaded = true;
        console.log('✅ Playing:', channel.name);
        isPlaying = false;
        break;
      } catch (_) {}
    }
    if (!loaded) { showError(channel); isPlaying = false; }
  } catch (_) { showError(channel); isPlaying = false; }
}

function closePlayer() {
  if (isClosing) return;
  isClosing = true;
  hideError();
  isPlaying = false;
  if (playTimeout) { clearTimeout(playTimeout); playTimeout = null; }
  destroyPlayer();
  videoEl.pause();
  videoEl.src = '';
  playerOverlay.classList.remove('active');
  
  // Exit fullscreen
  try {
    if (document.fullscreenElement) {
      document.exitFullscreen();
    } else if (document.webkitFullscreenElement) {
      document.webkitExitFullscreen();
    } else if (document.msFullscreenElement) {
      document.msExitFullscreen();
    }
  } catch (_) {}
  
  setTimeout(() => {
    isClosing = false;
    currentChannel = null;
    activeCookie = null;
  }, 200);
}

function destroyPlayer() {
  if (shakaPlayer) { try { shakaPlayer.destroy(); } catch (_) {} shakaPlayer = null; }
}

closePlayerBtn.addEventListener('click', closePlayer);
backBtn.addEventListener('click', closePlayer);
playerContainer.addEventListener('click', (e) => { if (e.target === playerContainer) closePlayer(); });

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (errorOverlay.classList.contains('active')) { hideError(); if (playerOverlay.classList.contains('active')) closePlayer(); } else { closePlayer(); }
  }
  if (e.key === ' ' && playerOverlay.classList.contains('active')) {
    e.preventDefault();
    videoEl.paused ? videoEl.play().catch(() => {}) : videoEl.pause();
  }
});

// ─── INIT ─────────────────────────────────────────────────
loadLastPlayed();
fetchChannels();
console.log('🚀 Live TV loaded.');
</script>
