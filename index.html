<!DOCTYPE html>
<html lang="en">
<head>
<!-- Preconnect for faster loading -->
<link rel="preconnect" href="https://fragrant-butterfly-575f.bhargavtodimela4.workers.dev" crossorigin>
<link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
<link rel="dns-prefetch" href="https://fragrant-butterfly-575f.bhargavtodimela4.workers.dev">
<link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="referrer" content="no-referrer">
<meta name="theme-color" content="#0a0e17">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Live TV Player</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js" defer></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

html,body{
  background: #0a0e17;
  width:100%;
  min-height:100vh;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif;
  color:#f0f2f5;
  overflow-x:hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overscroll-behavior: none;
}

::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: #0a0e17; }
::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #3b4bff, #6366f1); border-radius: 10px; }

/* Header */
.header {
    background: rgba(10, 14, 23, 0.92);
    padding: 12px 16px;
    border-bottom: 1px solid rgba(59, 75, 255, 0.06);
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
    backdrop-filter: blur(25px) saturate(1.2);
    -webkit-backdrop-filter: blur(25px) saturate(1.2);
    box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
    animation: slideDown 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    min-height: 56px;
}
@keyframes slideDown {
    from { transform: translateY(-100%); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}
.header h1 {
    font-size: clamp(1rem, 4vw, 1.3rem);
    font-weight: 700;
    background: linear-gradient(135deg, #e0e7ff, #818cf8, #3b4bff, #6366f1);
    background-size: 300% 300%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 6px;
    animation: gradientShift 4s ease infinite;
}
@keyframes gradientShift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
}
.header h1::before {
    content: "📡";
    -webkit-text-fill-color: initial;
    font-size: clamp(1rem, 3.5vw, 1.3rem);
    animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
}
.header .channel-counter {
    background: rgba(59, 75, 255, 0.08);
    padding: 3px 12px;
    border-radius: 40px;
    font-size: clamp(0.6rem, 1.8vw, 0.75rem);
    color: #b9c2d4;
    border: 1px solid rgba(59, 75, 255, 0.08);
    backdrop-filter: blur(4px);
    font-weight: 500;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    white-space: nowrap;
}

/* Filter Bar */
.filter-bar {
    background: rgba(17, 23, 31, 0.85);
    backdrop-filter: blur(20px) saturate(1.2);
    -webkit-backdrop-filter: blur(20px) saturate(1.2);
    padding: 10px 16px;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 6px 10px;
    border-bottom: 1px solid rgba(38, 46, 59, 0.15);
    position: sticky;
    top: 56px;
    z-index: 9;
    animation: slideDown 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.05s both;
    min-height: 48px;
}
.filter-bar input {
    flex: 1 1 140px;
    background: rgba(30, 38, 50, 0.35);
    border: 1px solid rgba(47, 56, 73, 0.25);
    color: #f0f2f5;
    padding: 6px 14px;
    border-radius: 30px;
    outline: none;
    font-size: clamp(0.75rem, 2vw, 0.85rem);
    min-width: 80px;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
}
.filter-bar input:focus {
    border-color: #3b4bff;
    box-shadow: 0 0 30px rgba(59, 75, 255, 0.08);
    background: rgba(30, 38, 50, 0.6);
}
.filter-bar input::placeholder {
    color: #7a869c;
}
.filter-bar .category-group {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    flex: 1 1 auto;
    justify-content: flex-start;
}
.filter-bar .category-btn {
    background: rgba(30, 38, 50, 0.25);
    border: 1px solid rgba(47, 56, 73, 0.15);
    color: #c8d0e0;
    padding: 3px 12px;
    border-radius: 30px;
    font-size: clamp(0.5rem, 1.5vw, 0.65rem);
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    white-space: nowrap;
    backdrop-filter: blur(4px);
    letter-spacing: 0.3px;
    text-transform: uppercase;
}
.filter-bar .category-btn.active {
    background: linear-gradient(135deg, #3b4bff, #6366f1);
    border-color: #3b4bff;
    color: white;
    box-shadow: 0 4px 20px rgba(59, 75, 255, 0.25);
    transform: scale(1.04);
}

/* Last Played Section */
.last-played-section {
    padding: 10px 16px 4px;
    max-width: 1440px;
    margin: 0 auto;
    width: 100%;
    display: none;
}
.last-played-section.visible {
    display: block;
    animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}
.last-played-section .section-title {
    font-size: clamp(0.6rem, 1.8vw, 0.75rem);
    color: #8895b0;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
    font-weight: 600;
}
.last-played-section .last-played-grid {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    padding-bottom: 6px;
    scrollbar-width: thin;
    -webkit-overflow-scrolling: touch;
}
.last-played-section .last-played-grid::-webkit-scrollbar {
    height: 2px;
}
.last-played-section .last-played-grid::-webkit-scrollbar-thumb {
    background: #3b4bff;
    border-radius: 10px;
}
.last-played-card {
    flex: 0 0 auto;
    width: clamp(70px, 15vw, 120px);
    background: linear-gradient(145deg, rgba(21, 29, 40, 0.8), rgba(17, 23, 31, 0.8));
    border-radius: 12px;
    padding: 8px 6px;
    border: 1px solid rgba(38, 48, 62, 0.2);
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    min-width: 60px;
}
.last-played-card:active {
    transform: scale(0.95);
}
.last-played-card .lp-logo {
    width: clamp(30px, 8vw, 50px);
    height: clamp(30px, 8vw, 50px);
    border-radius: 50%;
    background: rgba(14, 20, 30, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    border: 2px solid rgba(46, 58, 78, 0.2);
    margin-bottom: 4px;
}
.last-played-card .lp-logo img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    padding: 3px;
}
.last-played-card .lp-name {
    font-size: clamp(0.5rem, 1.5vw, 0.7rem);
    font-weight: 500;
    color: #e8edf5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    max-height: 2.2em;
    line-height: 1.2;
}
.last-played-card .lp-badge {
    font-size: clamp(0.4rem, 1vw, 0.5rem);
    color: #3b4bff;
    background: rgba(59, 75, 255, 0.15);
    padding: 1px 6px;
    border-radius: 30px;
    margin-top: 3px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.3px;
}

/* Grid */
.grid-container {
    padding: 12px 12px 24px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(clamp(90px, 20vw, 150px), 1fr));
    gap: clamp(8px, 2vw, 16px);
    max-width: 1440px;
    margin: 0 auto;
    width: 100%;
    animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.08s both;
}
@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Channel Card */
.channel-card {
    background: linear-gradient(145deg, rgba(21, 29, 40, 0.8), rgba(17, 23, 31, 0.8));
    border-radius: clamp(12px, 2vw, 16px);
    overflow: hidden;
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    border: 1px solid rgba(38, 48, 62, 0.2);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: clamp(10px, 2vw, 14px) clamp(6px, 1.5vw, 8px) clamp(8px, 1.5vw, 12px);
    position: relative;
    animation: cardFadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
    animation-delay: calc(var(--index, 0) * 0.03s);
    will-change: transform;
    -webkit-touch-callout: none;
}
@keyframes cardFadeIn {
    from { opacity: 0; transform: scale(0.94) translateY(12px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
}
.channel-card:active {
    transform: scale(0.95);
}
.channel-card .logo-wrapper {
    width: clamp(45px, 12vw, 72px);
    height: clamp(45px, 12vw, 72px);
    background: rgba(14, 20, 30, 0.4);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 6px;
    overflow: hidden;
    border: 2px solid rgba(46, 58, 78, 0.2);
    flex-shrink: 0;
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative;
    z-index: 1;
}
.channel-card .logo-wrapper:active {
    transform: scale(0.95);
}
.channel-card img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    padding: 4px;
    position: relative;
    z-index: 1;
}
.channel-card .channel-name {
    font-size: clamp(0.55rem, 1.8vw, 0.8rem);
    font-weight: 600;
    line-height: 1.3;
    color: #e8edf5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    word-break: break-word;
    max-height: 2.4em;
    position: relative;
    z-index: 1;
}
.channel-card .channel-category {
    font-size: clamp(0.45rem, 1.2vw, 0.55rem);
    color: #8895b0;
    margin-top: 3px;
    background: rgba(31, 42, 56, 0.4);
    padding: 1px 8px;
    border-radius: 30px;
    display: inline-block;
    font-weight: 500;
    letter-spacing: 0.3px;
    text-transform: uppercase;
    position: relative;
    z-index: 1;
    border: 1px solid rgba(47, 56, 73, 0.1);
}

/* Empty State */
.empty-box {
    grid-column: 1 / -1;
    text-align: center;
    padding: 40px 20px;
    color: #6d7b96;
    font-size: clamp(0.85rem, 2.5vw, 1rem);
    background: rgba(17, 23, 31, 0.25);
    border-radius: 18px;
    border: 1px dashed rgba(47, 56, 73, 0.15);
}
.empty-box::before {
    content: "📺";
    display: block;
    font-size: clamp(2.5rem, 8vw, 3rem);
    margin-bottom: 10px;
    animation: float 3s ease-in-out infinite;
}
@keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
}

/* Player Overlay */
.player-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #000;
    z-index: 1000;
    flex-direction: column;
}
.player-overlay.active {
    display: flex;
}
#player-container {
    width: 100%;
    height: 100%;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
}
#video {
    width: 100%;
    height: 100%;
    max-height: 100vh;
    background: #000;
}

/* iOS Style Buttons - Mobile Optimized */
.back-btn, .close-btn {
    position: absolute;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(20px) saturate(1.5);
    -webkit-backdrop-filter: blur(20px) saturate(1.5);
    border: 1px solid rgba(255,255,255,0.06);
    color: white;
    cursor: pointer;
    z-index: 1001;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
    touch-action: manipulation;
}
.back-btn {
    top: clamp(12px, 3vh, 18px);
    left: clamp(12px, 3vw, 18px);
    padding: clamp(4px, 1.5vw, 8px) clamp(10px, 3vw, 16px) clamp(4px, 1.5vw, 8px) clamp(8px, 2vw, 12px);
    border-radius: 30px;
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: clamp(0.65rem, 2vw, 0.85rem);
    font-weight: 500;
    animation: backBtnFade 0.4s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
}
@keyframes backBtnFade {
    from { opacity: 0; transform: translateX(-15px) scale(0.9); }
    to { opacity: 1; transform: translateX(0) scale(1); }
}
.back-btn:active {
    transform: scale(0.92);
}
.back-btn svg {
    width: clamp(12px, 3vw, 16px);
    height: clamp(12px, 3vw, 16px);
    fill: none;
    stroke: white;
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
}
.back-btn span {
    letter-spacing: 0.2px;
}

.close-btn {
    top: clamp(12px, 3vh, 18px);
    right: clamp(12px, 3vw, 18px);
    width: clamp(30px, 8vw, 40px);
    height: clamp(30px, 8vw, 40px);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: closeBtnFade 0.4s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
}
@keyframes closeBtnFade {
    from { opacity: 0; transform: scale(0.7) rotate(-90deg); }
    to { opacity: 1; transform: scale(1) rotate(0); }
}
.close-btn:active {
    transform: scale(0.88);
}
.close-btn svg {
    width: clamp(14px, 4vw, 18px);
    height: clamp(14px, 4vw, 18px);
    fill: none;
    stroke: white;
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
}

/* Player Info - Mobile Optimized */
.player-info {
    position: absolute;
    bottom: clamp(40px, 10vh, 80px);
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(20px) saturate(1.5);
    -webkit-backdrop-filter: blur(20px) saturate(1.5);
    padding: clamp(4px, 1.5vw, 6px) clamp(12px, 4vw, 20px) clamp(4px, 1.5vw, 6px) clamp(10px, 3vw, 14px);
    border-radius: 50px;
    border: 1px solid rgba(255,255,255,0.05);
    color: #eef2f8;
    font-size: clamp(0.6rem, 2vw, 0.85rem);
    font-weight: 500;
    pointer-events: none;
    display: flex;
    align-items: center;
    gap: clamp(6px, 2vw, 10px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    animation: slideUpFade 0.4s cubic-bezier(0.16, 1, 0.3, 1) 0.4s both;
    white-space: nowrap;
    max-width: 90%;
}
@keyframes slideUpFade {
    from { opacity: 0; transform: translateX(-50%) translateY(15px) scale(0.95); }
    to { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
}
.player-info img {
    width: clamp(20px, 5vw, 28px);
    height: clamp(20px, 5vw, 28px);
    border-radius: 50%;
    background: rgba(30, 38, 50, 0.6);
    padding: 2px;
    border: 1px solid rgba(255,255,255,0.05);
}
.player-info .channel-name-text {
    max-width: clamp(60px, 40vw, 180px);
    overflow: hidden;
    text-overflow: ellipsis;
}

/* Ripple */
.ripple-container {
    position: fixed;
    pointer-events: none;
    z-index: 999;
}
.ripple {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(59, 75, 255, 0.25), rgba(99, 102, 241, 0.1), transparent);
    transform: scale(0);
    animation: rippleExpand 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}
@keyframes rippleExpand {
    0% { transform: scale(0); opacity: 1; }
    100% { transform: scale(25); opacity: 0; }
}

/* Expand/Shrink */
.video-expand, .video-shrink {
    position: fixed;
    pointer-events: none;
    z-index: 999;
    overflow: hidden;
    will-change: transform, width, height, top, left;
}
.video-expand {
    border-radius: clamp(12px, 2vw, 16px);
    box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
    transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
}
.video-shrink {
    border-radius: 0;
    box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
    transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
}

/* Modern Error Modal - Mobile Optimized */
.error-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(20px);
    z-index: 2000;
    justify-content: center;
    align-items: center;
    animation: fadeIn 0.3s ease;
    padding: 20px;
}
.error-overlay.active {
    display: flex;
}
@keyframes fadeIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
}
.error-modal {
    background: linear-gradient(145deg, #1a1f2e, #141a24);
    border-radius: clamp(20px, 4vw, 24px);
    padding: clamp(24px, 5vw, 40px) clamp(20px, 5vw, 36px) clamp(20px, 4vw, 32px);
    max-width: 420px;
    width: 100%;
    text-align: center;
    border: 1px solid rgba(59, 75, 255, 0.1);
    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
    animation: modalSlide 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes modalSlide {
    from { opacity: 0; transform: translateY(20px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
}
.error-modal .error-icon {
    font-size: clamp(2.5rem, 8vw, 3.5rem);
    margin-bottom: 12px;
    display: block;
    animation: float 2s ease-in-out infinite;
}
.error-modal h2 {
    color: #f0f2f5;
    font-size: clamp(1rem, 3vw, 1.3rem);
    font-weight: 700;
    margin-bottom: 8px;
}
.error-modal p {
    color: #8895b0;
    font-size: clamp(0.8rem, 2vw, 0.95rem);
    line-height: 1.5;
    margin-bottom: 20px;
}
.error-modal .error-actions {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
}
.error-modal .error-btn {
    padding: clamp(8px, 2vw, 10px) clamp(20px, 5vw, 28px);
    border-radius: 30px;
    border: none;
    font-size: clamp(0.75rem, 2vw, 0.85rem);
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    touch-action: manipulation;
}
.error-modal .error-btn:active {
    transform: scale(0.95);
}
.error-modal .error-btn.primary {
    background: linear-gradient(135deg, #3b4bff, #6366f1);
    color: white;
    box-shadow: 0 4px 20px rgba(59, 75, 255, 0.3);
}
.error-modal .error-btn.secondary {
    background: rgba(255,255,255,0.08);
    color: #b9c2d4;
    border: 1px solid rgba(255,255,255,0.06);
}

/* Mobile Specific Optimizations */
@media (max-width: 480px) {
    .filter-bar {
        top: 48px;
        padding: 8px 12px;
    }
    .filter-bar .category-group {
        gap: 3px;
    }
    .filter-bar .category-btn {
        padding: 2px 8px;
        font-size: 0.5rem;
    }
    .grid-container {
        padding: 8px 8px 16px;
        gap: 6px;
    }
    .channel-card {
        padding: 8px 4px 6px;
    }
    .channel-card .logo-wrapper {
        width: 50px;
        height: 50px;
    }
    .channel-card .channel-name {
        font-size: 0.55rem;
    }
    .header {
        padding: 8px 12px;
        min-height: 48px;
    }
    .header h1 {
        font-size: 0.95rem;
    }
    .header .channel-counter {
        font-size: 0.55rem;
        padding: 2px 10px;
    }
    .last-played-card {
        width: 70px;
        padding: 6px 4px;

<body>

<header class="header">
    <h1>Live TV</h1>
    <span class="channel-counter" id="channelCounter">0 channels</span>
</header>

<div class="filter-bar">
    <input type="text" id="searchInput" placeholder="🔍 Search channels..." />
    <div class="category-group" id="categoryGroup"></div>
</div>

<!-- Last Played Section -->
<div class="last-played-section" id="lastPlayedSection">
    <div class="section-title">🕐 Recently Played</div>
    <div class="last-played-grid" id="lastPlayedGrid"></div>
</div>

<div class="grid-container" id="channelGrid"></div>

<div class="player-overlay" id="playerOverlay">
    <button class="back-btn" id="backBtn">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg>
        <span>Back</span>
    </button>
    <button class="close-btn" id="closePlayer">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </button>
    <div id="player-container">
        <video id="video" controls playsinline autoplay></video>
    </div>
    <div class="player-info" id="playerInfo">
        <img id="playerLogo" src="" alt="logo" />
        <span class="channel-name-text" id="playerName">Channel</span>
    </div>
</div>

<!-- Modern Error Modal -->
<div class="error-overlay" id="errorOverlay">
    <div class="error-modal">
        <span class="error-icon">⚠️</span>
        <h2>Technical Difficulties</h2>
        <p>This channel is currently facing technical difficulties. Please try again later or choose another channel.</p>
        <div class="error-actions">
            <button class="error-btn primary" id="errorRetry">Retry</button>
            <button class="error-btn secondary" id="errorClose">OK</button>
        </div>
    </div>
</div>

<script>
// ─── GLOBALS ──────────────────────────────────────────
let allChannels = [];
let filteredChannels = [];
let currentCategory = 'All';
let searchTerm = '';
let cachedCookie = null;
let activeCookie = null;
let expandElement = null;
let isClosing = false;
let shakaPlayer = null;
let currentChannel = null;
let currentCardRect = null;
let errorChannel = null;
let isErrorShowing = false;
let lastPlayedChannels = [];
let isPlaying = false;
let playTimeout = null;
let audioSelectionTimer = null;

// ─── LOCAL STORAGE ────────────────────────────────────
const STORAGE_KEY = 'liveTV_lastPlayed';

function loadLastPlayed() {
    try {
        const data = localStorage.getItem(STORAGE_KEY);
        if (data) {
            lastPlayedChannels = JSON.parse(data);
            // Store only essential data to save space
            lastPlayedChannels = lastPlayedChannels.filter(ch => ch && ch.id && ch.name);
            return lastPlayedChannels;
        }
    } catch (e) {
        console.warn('Failed to load last played:', e);
    }
    return [];
}

function saveLastPlayed(channel) {
    if (!channel || !channel.id) return;
    
    // Store only essential data to save localStorage space
    const minimalChannel = {
        id: channel.id,
        name: channel.name,
        category: channel.category || 'General',
        logo: channel.logo || '',
        url: channel.url || '',
        keyId: channel.keyId || null,
        key: channel.key || null
    };
    
    lastPlayedChannels = lastPlayedChannels.filter(ch => ch.id !== channel.id);
    lastPlayedChannels.unshift(minimalChannel);
    lastPlayedChannels = lastPlayedChannels.slice(0, 10);
    
    try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(lastPlayedChannels));
    } catch (e) {
        console.warn('Failed to save last played:', e);
    }
    renderLastPlayed();
}

function renderLastPlayed() {
    const section = document.getElementById('lastPlayedSection');
    const grid = document.getElementById('lastPlayedGrid');
    
    if (!lastPlayedChannels.length) {
        section.classList.remove('visible');
        return;
    }
    
    section.classList.add('visible');
    grid.innerHTML = lastPlayedChannels.map(ch => `
        <div class="last-played-card" data-channel='${JSON.stringify(ch).replace(/'/g,"&#39;")}'>
            <div class="lp-logo">
                <img src="${ch.logo || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(ch.name) + '&background=1e2632&color=fff&size=50'}" 
                     alt="${ch.name}" 
                     loading="lazy"
                     decoding="async"
                     onerror="this.onerror=null;this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(ch.name)}&background=1e2632&color=fff&size=50';" />
            </div>
            <div class="lp-name">${ch.name}</div>
            <div class="lp-badge">▶ Play</div>
        </div>
    `).join('');
    
    grid.querySelectorAll('.last-played-card').forEach(card => {
        card.addEventListener('click', (e) => {
            e.stopPropagation();
            if (isClosing || isPlaying) return;
            const raw = card.dataset.channel;
            try {
                const ch = JSON.parse(raw);
                const rect = card.getBoundingClientRect();
                const x = e.clientX || rect.left + rect.width/2;
                const y = e.clientY || rect.top + rect.height/2;
                
                createRipple(x, y);
                
                // Create temporary card for animation
                const tempCard = document.createElement('div');
                tempCard.className = 'channel-card';
                tempCard.style.cssText = `
                    width:${rect.width}px;
                    height:${rect.height}px;
                    position:fixed;
                    left:${rect.left}px;
                    top:${rect.top}px;
                    background: linear-gradient(145deg, rgba(21, 29, 40, 0.8), rgba(17, 23, 31, 0.8));
                    border-radius: 14px;
                    display:flex;
                    flex-direction:column;
                    align-items:center;
                    justify-content:center;
                    padding:14px 8px;
                    border:1px solid rgba(38,48,62,0.2);
                    z-index:998;
                `;
                tempCard.innerHTML = `
                    <div class="logo-wrapper" style="width:72px;height:72px;background:rgba(14,20,30,0.4);border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:8px;overflow:hidden;border:2px solid rgba(46,58,78,0.2);">
                        <img src="${ch.logo || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(ch.name) + '&background=1e2632&color=fff&size=80'}" style="max-width:100%;max-height:100%;object-fit:contain;padding:5px;" />
                    </div>
                    <div class="channel-name" style="font-size:0.8rem;font-weight:600;color:#e8edf5;">${ch.name}</div>
                    <span class="channel-category" style="font-size:0.55rem;color:#8895b0;margin-top:4px;background:rgba(31,42,56,0.4);padding:2px 10px;border-radius:30px;border:1px solid rgba(47,56,73,0.1);">${ch.category || 'General'}</span>
                `;
                document.body.appendChild(tempCard);
                
                createExpandAnimation(tempCard);
                setTimeout(() => {
                    if (tempCard.parentNode) tempCard.remove();
                }, 600);
                setTimeout(() => playChannel(ch), 450);
            } catch(e) {
                console.error('Failed to play last played channel:', e);
            }
        }, { passive: true });
    });
}

// ─── DOM REFS ─────────────────────────────────────────
const grid = document.getElementById('channelGrid');
const searchInput = document.getElementById('searchInput');
const categoryGroup = document.getElementById('categoryGroup');
const channelCounter = document.getElementById('channelCounter');
const playerOverlay = document.getElementById('playerOverlay');
const closePlayerBtn = document.getElementById('closePlayer');
const backBtn = document.getElementById('backBtn');
const videoEl = document.getElementById('video');
const playerContainer = document.getElementById('player-container');
const playerName = document.getElementById('playerName');
const playerLogo = document.getElementById('playerLogo');
const errorOverlay = document.getElementById('errorOverlay');
const errorRetry = document.getElementById('errorRetry');
const errorClose = document.getElementById('errorClose');

// ─── MEMORY OPTIMIZATION ─────────────────────────────
function cleanupAnimations() {
    if (expandElement) {
        expandElement.remove();
        expandElement = null;
    }
    document.querySelectorAll('.ripple-container, .video-expand, .video-shrink').forEach(el => {
        if (el.parentNode) el.remove();
    });
}

function destroyPlayer() {
    if (audioSelectionTimer) {
        clearTimeout(audioSelectionTimer);
        audioSelectionTimer = null;
    }
    if (shakaPlayer) {
        try {
            shakaPlayer.destroy();
        } catch(e) {
            console.warn('Player destroy error:', e);
        }
        shakaPlayer = null;
    }
}

// ─── RIPPLE EFFECT ────────────────────────────────────
function createRipple(x, y) {
    const container = document.createElement('div');
    container.className = 'ripple-container';
    container.style.cssText = 'position:fixed;pointer-events:none;z-index:999;top:0;left:0;width:100%;height:100%';
    
    const ripple = document.createElement('div');
    ripple.className = 'ripple';
    const size = Math.min(window.innerWidth, window.innerHeight) * 0.2;
    ripple.style.cssText = `width:${size}px;height:${size}px;left:${x - size/2}px;top:${y - size/2}px`;
    
    container.appendChild(ripple);
    document.body.appendChild(container);
    setTimeout(() => { if (container.parentNode) container.remove(); }, 700);
}

// ─── EXPAND ANIMATION ────────────────────────────────
function createExpandAnimation(card) {
    cleanupAnimations();
    const rect = card.getBoundingClientRect();
    currentCardRect = rect;
    
    expandElement = document.createElement('div');
    expandElement.className = 'video-expand';
    expandElement.style.cssText = `
        width:${rect.width}px;
        height:${rect.height}px;
        left:${rect.left}px;
        top:${rect.top}px;
        background:#151d28;
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:center;
        padding:20px;
    `;
    
    const clone = card.cloneNode(true);
    clone.style.cssText = `
        width:100%;
        height:100%;
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:center;
        background:transparent;
        border:none;
        box-shadow:none;
    `;
    const wrapper = clone.querySelector('.logo-wrapper');
    if (wrapper) { wrapper.style.width = '100px'; wrapper.style.height = '100px'; }
    const name = clone.querySelector('.channel-name');
    if (name) name.style.fontSize = '1.2rem';
    const cat = clone.querySelector('.channel-category');
    if (cat) cat.style.fontSize = '0.7rem';
    
    expandElement.appendChild(clone);
    document.body.appendChild(expandElement);
    
    requestAnimationFrame(() => {
        expandElement.style.width = '100%';
        expandElement.style.height = '100%';
        expandElement.style.left = '0';
        expandElement.style.top = '0';
        expandElement.style.borderRadius = '0';
    });
    
    setTimeout(() => {
        if (expandElement) {
            expandElement.remove();
            expandElement = null;
        }
        playerOverlay.classList.add('active');
    }, 500);
}

// ─── SHRINK ANIMATION ────────────────────────────────
function createShrinkAnimation(callback) {
    if (!currentCardRect) {
        if (callback) callback();
        return;
    }
    
    const rect = currentCardRect;
    const shrinkEl = document.createElement('div');
    shrinkEl.className = 'video-shrink';
    shrinkEl.style.cssText = `
        width:100%;
        height:100%;
        left:0;
        top:0;
        background:#000;
        display:flex;
        align-items:center;
        justify-content:center;
        z-index:1000;
    `;
    
    const snapshot = document.createElement('div');
    snapshot.style.cssText = `
        width:100%;
        height:100%;
        background:linear-gradient(135deg, #151d28, #0a0e17);
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:center;
    `;
    
    const logo = currentChannel?.logo || '';
    const name = currentChannel?.name || 'Channel';
    snapshot.innerHTML = `
        <img src="${logo}" style="width:70px;height:70px;border-radius:50%;object-fit:contain;background:#1e2632;padding:8px;margin-bottom:12px;" />
        <div style="color:#e8edf5;font-size:1rem;font-weight:600;">${name}</div>
    `;
    
    shrinkEl.appendChild(snapshot);
    document.body.appendChild(shrinkEl);
    
    requestAnimationFrame(() => {
        shrinkEl.style.transition = 'all 0.4s cubic-bezier(0.16, 1, 0.3, 1)';
        shrinkEl.style.width = rect.width + 'px';
        shrinkEl.style.height = rect.height + 'px';
        shrinkEl.style.left = rect.left + 'px';
        shrinkEl.style.top = rect.top + 'px';
        shrinkEl.style.borderRadius = '16px';
        shrinkEl.style.boxShadow = '0 30px 80px rgba(0,0,0,0.6)';
        shrinkEl.style.overflow = 'hidden';
        snapshot.style.transform = 'scale(0.7)';
        snapshot.style.opacity = '0.5';
    });
    
    setTimeout(() => {
        if (shrinkEl) shrinkEl.remove();
        if (callback) callback();
    }, 450);
}

// ─── MODERN ERROR HANDLING ───────────────────────────
function showError(channel) {
    if (isErrorShowing) return;
    isErrorShowing = true;
    errorChannel = channel;
    errorOverlay.classList.add('active');
}

function hideError() {
    isErrorShowing = false;
    errorOverlay.classList.remove('active');
    errorChannel = null;
}

errorRetry.addEventListener('click', () => {
    hideError();
    if (errorChannel) {
        // Clear cookie cache to force fresh fetch
        cachedCookie = null;
        setTimeout(() => playChannel(errorChannel), 300);
    }
});

errorClose.addEventListener('click', () => {
    hideError();
    if (playerOverlay.classList.contains('active')) {
        closePlayer();
    }
});

errorOverlay.addEventListener('click', (e) => {
    if (e.target === errorOverlay) {
        hideError();
        if (playerOverlay.classList.contains('active')) {
            closePlayer();
        }
    }
});

// ─── FETCH COOKIE ────────────────────────────────────
async function fetchCookie() {
    try {
        const res = await fetch('https://fragrant-butterfly-575f.bhargavtodimela4.workers.dev/cookies', {
            cache: 'no-cache',
            headers: {
                'Cache-Control': 'no-cache, no-store, must-revalidate',
                'Pragma': 'no-cache'
            }
        });
        const data = await res.json();
        const cookieObj = data.find(item => item.cookie);
        if (cookieObj && cookieObj.cookie) {
            cachedCookie = cookieObj.cookie;
            return cachedCookie;
        }
        return null;
    } catch (e) {
        console.warn('Cookie fetch failed:', e);
        return null;
    }
}

// ─── FETCH CHANNELS ──────────────────────────────────
async function fetchChannels() {
    try {
        const res = await fetch('https://fragrant-butterfly-575f.bhargavtodimela4.workers.dev/channels', {
            headers: { 'X-Requested-With': 'XMLHttpRequest' },
            cache: 'no-cache'
        });
        const data = await res.json();
        allChannels = Array.isArray(data) ? data : (data.channels || []);
        allChannels = allChannels.filter(c => c && typeof c === 'object' && c.name);
        
        extractCategories();
        applyFilters();
        updateCounter();
        
        // Load last played after channels are loaded
        loadLastPlayed();
        renderLastPlayed();
    } catch (e) {
        grid.innerHTML = `<div class="empty-box">⚠️ Could not load channels. Refresh or try again later.</div>`;
        console.error(e);
    }
}

// ─── CATEGORIES ──────────────────────────────────────
function extractCategories() {
    const cats = new Set();
    cats.add('All');
    allChannels.forEach(c => {
        if (c.category && c.category.trim()) cats.add(c.category.trim());
    });
    const sorted = ['All', ...Array.from(cats).filter(c => c !== 'All').sort()];
    categoryGroup.innerHTML = sorted.map(cat =>
        `<span class="category-btn ${cat === 'All' ? 'active' : ''}" data-cat="${cat}">${cat}</span>`
    ).join('');

    document.querySelectorAll('.category-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentCategory = btn.dataset.cat;
            applyFilters();
        });
    });
}

// ─── FILTER & RENDER ─────────────────────────────────
function applyFilters() {
    const term = searchTerm.toLowerCase().trim();
    filteredChannels = allChannels.filter(ch => {
        const matchName = ch.name.toLowerCase().includes(term);
        const matchCat = currentCategory === 'All' || ch.category === currentCategory;
        return matchName && matchCat;
    });
    renderGrid();
    updateCounter();
}

function renderGrid() {
    if (!filteredChannels.length) {
        grid.innerHTML = `<div class="empty-box">📭 No channels found</div>`;
        return;
    }
    let html = '';
    filteredChannels.forEach((ch, index) => {
        const logo = ch.logo || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(ch.name) + '&background=1e2632&color=fff&size=80';
        html += `
            <div class="channel-card" style="--index: ${index}" data-channel='${JSON.stringify(ch).replace(/'/g,"&#39;")}'>
                <div class="logo-wrapper">
                    <img src="${logo}" alt="${ch.name}" loading="lazy" decoding="async" onerror="this.onerror=null;this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(ch.name)}&background=1e2632&color=fff&size=80';" />
                </div>
                <div class="channel-name">${ch.name}</div>
                <span class="channel-category">${ch.category || 'General'}</span>
            </div>
        `;
    });
    grid.innerHTML = html;

    document.querySelectorAll('.channel-card').forEach(card => {
        card.addEventListener('click', (e) => {
            if (isClosing || isPlaying) return;
            const rect = card.getBoundingClientRect();
            const x = e.clientX || rect.left + rect.width/2;
            const y = e.clientY || rect.top + rect.height/2;
            
            createRipple(x, y);
            createExpandAnimation(card);
            
            const raw = card.dataset.channel;
            try {
                const ch = JSON.parse(raw);
                if (playTimeout) clearTimeout(playTimeout);
                playTimeout = setTimeout(() => playChannel(ch), 450);
            } catch(e) {
                const id = card.dataset.id;
                const found = allChannels.find(c => String(c.id) === String(id));
                if (found) {
                    if (playTimeout) clearTimeout(playTimeout);
                    playTimeout = setTimeout(() => playChannel(found), 450);
                }
            }
        }, { passive: true });
    });
}

function updateCounter() {
    const total = allChannels.length;
    const filtered = filteredChannels.length;
    channelCounter.textContent = `${filtered} / ${total} channels`;
}

// ─── SEARCH ──────────────────────────────────────────
searchInput.addEventListener('input', (e) => {
    searchTerm = e.target.value;
    applyFilters();
}, { passive: true });

// ─── PLAY CHANNEL ────────────────────────────────────
async function playChannel(channel) {
    if (!channel || isClosing) return;
    if (isPlaying) {
        console.warn('Already playing a channel');
        return;
    }
    
    isPlaying = true;
    currentChannel = channel;
    playerName.textContent = channel.name || 'Channel';
    playerLogo.src = channel.logo || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(channel.name) + '&background=1e2632&color=fff&size=40';

    // Save to last played
    saveLastPlayed(channel);

    // Destroy old player if exists
    destroyPlayer();

    try {
        shaka.polyfill.installAll();
        if (!shaka.Player.isBrowserSupported()) {
            showError(channel);
            isPlaying = false;
            return;
        }
        
        shakaPlayer = new shaka.Player(videoEl);
        try {
            new shaka.ui.Overlay(shakaPlayer, playerContainer, videoEl);
        } catch(e) { /* ignore */ }

        // Set preferred audio language to Telugu
        shakaPlayer.configure({
            preferredAudioLanguage: 'te',
            preferredTextLanguage: 'en',
            drm: {},
            streaming: { 
                lowLatencyMode: true,
                rebufferingGoal: 2,
                bufferBehind: 30
            }
        });

        const keyId = channel.keyId && channel.keyId !== 'null' ? channel.keyId : null;
        const key = channel.key && channel.key !== 'null' ? channel.key : null;
        
        if (keyId && key) {
            shakaPlayer.configure({
                drm: { clearKeys: { [keyId]: key } },
                streaming: { lowLatencyMode: true }
            });
        } else {
            shakaPlayer.configure({
                drm: { clearKeys: {} },
                streaming: { lowLatencyMode: true }
            });
        }

        // Fetch fresh cookie
        const cookie = await fetchCookie();
        activeCookie = cookie || '';

        if (shakaPlayer.getNetworkingEngine) {
            const engine = shakaPlayer.getNetworkingEngine();
            engine.registerRequestFilter((type, request) => {
                request.headers["Referer"] = "https://www.jiotv.com/";
                request.headers["User-Agent"] = "plaYtv/7.1.5";
                if (activeCookie && (type === 0 || type === 1)) {
                    request.uris[0] = request.uris[0].split("?")[0] + "?" + activeCookie;
                }
            });
        }

        const streamUrls = [channel.url, channel.url1, channel.url2, channel.url3]
            .filter(Boolean)
            .map(u => u.replace('bpk-tv//', 'bpk-tv/'));

        let loaded = false;
        for (let i = 0; i < streamUrls.length; i++) {
            try {
                await shakaPlayer.load(streamUrls[i]);
                
                // Try to select Telugu audio after a small delay
                if (audioSelectionTimer) clearTimeout(audioSelectionTimer);
                audioSelectionTimer = setTimeout(() => {
                    try {
                        if (!shakaPlayer) return;
                        const tracks = shakaPlayer.getAudioTracks();
                        if (tracks && tracks.length > 0) {
                            let teluguTrack = tracks.find(t => t.language === 'te');
                            if (!teluguTrack) {
                                teluguTrack = tracks.find(t => ['hi', 'ta', 'ml', 'kn', 'mr', 'bn'].includes(t.language));
                            }
                            if (teluguTrack) {
                                shakaPlayer.selectAudioTrack(teluguTrack);
                                console.log('🎤 Selected audio:', teluguTrack.language);
                            }
                        }
                    } catch (audioError) {
                        console.warn('Audio selection failed:', audioError);
                    }
                    audioSelectionTimer = null;
                }, 500);
                
                await videoEl.play();
                loaded = true;
                console.log('✅ Playing:', channel.name);
                isPlaying = false;
                break;
            } catch (e) {
                console.warn('Stream attempt', i+1, 'failed:', e);
            }
        }

        if (!loaded) {
            showError(channel);
            isPlaying = false;
        }
    } catch (e) {
        console.error('Play error:', e);
        showError(channel);
        isPlaying = false;
    }
}

// ─── CLOSE PLAYER ────────────────────────────────────
function closePlayer() {
    if (isClosing) return;
    isClosing = true;
    hideError();
    isPlaying = false;
    
    if (playTimeout) {
        clearTimeout(playTimeout);
        playTimeout = null;
    }
    if (audioSelectionTimer) {
        clearTimeout(audioSelectionTimer);
        audioSelectionTimer = null;
    }
    
    destroyPlayer();
    videoEl.pause();
    videoEl.src = '';
    
    playerOverlay.classList.remove('active');
    cleanupAnimations();
    
    createShrinkAnimation(() => {
        isClosing = false;
        currentChannel = null;
        activeCookie = null;
        currentCardRect = null;
    });
}

// ─── EVENT LISTENERS ────────────────────────────────
closePlayerBtn.addEventListener('click', closePlayer);
backBtn.addEventListener('click', closePlayer);

playerContainer.addEventListener('click', (e) => {
    if (e.target === playerContainer) closePlayer();
});

document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
        if (errorOverlay.classList.contains('active')) {
            hideError();
            if (playerOverlay.classList.contains('active')) {
                closePlayer();
            }
        } else {
            closePlayer();
        }
    }
    // Space for play/pause
    if (e.key === ' ' && playerOverlay.classList.contains('active')) {
        e.preventDefault();
        if (videoEl.paused) {
            videoEl.play().catch(() => {});
        } else {
            videoEl.pause();
        }
    }
});

// Handle memory cleanup on page unload
window.addEventListener('beforeunload', () => {
    destroyPlayer();
    cleanupAnimations();
});

// ─── INIT ────────────────────────────────────────────
// Load last played from storage
loadLastPlayed();

if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', fetchChannels);
} else {
    fetchChannels();
}

console.log('🚀 Live TV loaded. Click any channel to play.');
console.log('🎤 Audio will default to Telugu when available.');
console.log('🕐 Last played channels are saved locally.');
console.log('📱 Optimized for mobile and desktop.');
</script>
